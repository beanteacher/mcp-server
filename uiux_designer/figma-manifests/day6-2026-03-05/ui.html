<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Dashboard - Sprint4 Day6 Theme & Animation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A0F1E;
      color: #F8FAFC;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #3B82F6;
      margin-bottom: 2px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 11px;
      color: #94A3B8;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 150ms ease, transform 80ms ease;
      margin-bottom: 6px;
      text-align: left;
      color: inherit;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: #3B82F6;
      color: #fff;
    }
    .btn-primary:hover { background: #1D4ED8; }

    .btn-secondary {
      background: #1E293B;
      color: #E2E8F0;
    }
    .btn-secondary:hover { background: #2D3F56; }

    .btn-ghost {
      background: transparent;
      color: #94A3B8;
      border: 1px solid #1E293B;
    }
    .btn-ghost:hover { background: #1E293B; }

    .badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: #0A0F1E;
      color: #94A3B8;
      margin-left: 4px;
      vertical-align: middle;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .badge-dark  { color: #93C5FD; }
    .badge-light { color: #FCD34D; }
    .badge-anim  { color: #4ADE80; }

    .icon { font-size: 15px; flex-shrink: 0; }

    .divider {
      border: none;
      border-top: 1px solid #1E293B;
      margin: 14px 0;
    }

    #status {
      font-size: 11px;
      color: #22C55E;
      min-height: 16px;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>MCP Dashboard Day6</h1>
  <p class="subtitle">Sprint 4 — 다크/라이트 모드 + 애니메이션 — 2026-03-05</p>

  <button class="btn btn-primary" onclick="send('build-all')">
    <span class="icon">⚡</span>
    전체 프레임 생성 (4개)
  </button>

  <hr class="divider" />

  <div class="section-title">테마 시스템</div>

  <button class="btn btn-secondary" onclick="send('build-header-dark')">
    <span class="icon">🌙</span>
    Header — Dark Mode
    <span class="badge badge-dark">dark</span>
  </button>

  <button class="btn btn-secondary" onclick="send('build-header-light')">
    <span class="icon">☀️</span>
    Header — Light Mode
    <span class="badge badge-light">light</span>
  </button>

  <button class="btn btn-secondary" onclick="send('build-toggle-states')">
    <span class="icon">🔘</span>
    ThemeToggle States
    <span class="badge badge-dark">달/해</span>
  </button>

  <hr class="divider" />

  <div class="section-title">애니메이션</div>

  <button class="btn btn-secondary" onclick="send('build-commit-stagger')">
    <span class="icon">✨</span>
    CommitCard Stagger
    <span class="badge badge-anim">fade-up</span>
  </button>

  <hr class="divider" />

  <button class="btn btn-ghost" onclick="send('close')">
    <span class="icon">✕</span>
    플러그인 닫기
  </button>

  <div id="status"></div>

  <script>
    const messages = {
      'build-all':           '전체 프레임 생성 중...',
      'build-header-dark':   'Header Dark 프레임 생성 중...',
      'build-header-light':  'Header Light 프레임 생성 중...',
      'build-toggle-states': 'ThemeToggle States 프레임 생성 중...',
      'build-commit-stagger':'CommitCard Stagger 프레임 생성 중...',
      'close':               '종료 중...',
    };

    function send(type) {
      parent.postMessage({ pluginMessage: { type } }, '*');
      const el = document.getElementById('status');
      el.textContent = messages[type] || '';
    }
  </script>
</body>
</html>
