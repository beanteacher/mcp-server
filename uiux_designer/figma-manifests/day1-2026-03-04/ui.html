<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Tools Design System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A0F1E;
      color: #F8FAFC;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      font-size: 16px;
      font-weight: 700;
      color: #3B82F6;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 11px;
      color: #94A3B8;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 150ms ease, transform 80ms ease;
      margin-bottom: 6px;
      text-align: left;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: #3B82F6;
      color: #fff;
    }
    .btn-primary:hover { background: #1D4ED8; }

    .btn-secondary {
      background: #1E293B;
      color: #E2E8F0;
    }
    .btn-secondary:hover { background: #2D3F56; }

    .btn-danger {
      background: transparent;
      color: #94A3B8;
      border: 1px solid #1E293B;
    }
    .btn-danger:hover { background: #1E293B; }

    .icon { font-size: 15px; flex-shrink: 0; }

    .divider {
      border: none;
      border-top: 1px solid #1E293B;
      margin: 16px 0;
    }

    #status {
      font-size: 11px;
      color: #22C55E;
      min-height: 16px;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>MCP Tools Design System</h1>
  <p class="subtitle">Sprint 1 Day 1 — 2026-03-04</p>

  <button class="btn btn-primary" onclick="send('build-all')">
    <span class="icon">⚡</span>
    전체 프레임 생성 (5개)
  </button>

  <hr class="divider" />

  <div class="section-title">개별 생성</div>

  <button class="btn btn-secondary" onclick="send('build-colors')">
    <span class="icon">🎨</span>
    Colors 스와치
  </button>

  <button class="btn btn-secondary" onclick="send('build-typography')">
    <span class="icon">🔤</span>
    Typography 스케일
  </button>

  <button class="btn btn-secondary" onclick="send('build-spacing')">
    <span class="icon">📐</span>
    Spacing 스케일
  </button>

  <hr class="divider" />

  <div class="section-title">컴포넌트</div>

  <button class="btn btn-secondary" onclick="send('build-header')">
    <span class="icon">🔝</span>
    Header 컴포넌트
  </button>

  <button class="btn btn-secondary" onclick="send('build-navigation')">
    <span class="icon">🗂</span>
    Navigation 상태별 목업
  </button>

  <hr class="divider" />

  <button class="btn btn-danger" onclick="send('close')">
    <span class="icon">✕</span>
    플러그인 닫기
  </button>

  <div id="status"></div>

  <script>
    function send(type) {
      parent.postMessage({ pluginMessage: { type } }, '*');
      const statusEl = document.getElementById('status');
      const messages = {
        'build-all':        '전체 프레임 생성 중...',
        'build-colors':     'Colors 프레임 생성 중...',
        'build-typography': 'Typography 프레임 생성 중...',
        'build-spacing':    'Spacing 프레임 생성 중...',
        'build-header':     'Header 프레임 생성 중...',
        'build-navigation': 'Navigation 프레임 생성 중...',
        'close':            '플러그인 종료 중...',
      };
      statusEl.textContent = messages[type] || '';
    }
  </script>
</body>
</html>
