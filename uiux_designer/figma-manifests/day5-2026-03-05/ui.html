<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Dashboard - Sprint3 Day1 Responsive Frames</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A0F1E;
      color: #F8FAFC;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #3B82F6;
      margin-bottom: 2px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 11px;
      color: #94A3B8;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 150ms ease, transform 80ms ease;
      margin-bottom: 6px;
      text-align: left;
      color: inherit;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: #3B82F6;
      color: #fff;
    }
    .btn-primary:hover { background: #1D4ED8; }

    .btn-secondary {
      background: #1E293B;
      color: #E2E8F0;
    }
    .btn-secondary:hover { background: #2D3F56; }

    .btn-ghost {
      background: transparent;
      color: #94A3B8;
      border: 1px solid #1E293B;
    }
    .btn-ghost:hover { background: #1E293B; }

    .badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: #0A0F1E;
      color: #94A3B8;
      margin-left: 4px;
      vertical-align: middle;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .badge-mobile { color: #93C5FD; }
    .badge-desktop { color: #4ADE80; }

    .icon { font-size: 15px; flex-shrink: 0; }

    .divider {
      border: none;
      border-top: 1px solid #1E293B;
      margin: 14px 0;
    }

    #status {
      font-size: 11px;
      color: #22C55E;
      min-height: 16px;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>MCP Dashboard Day5</h1>
  <p class="subtitle">Sprint 3 Day 1 — 반응형 스펙 프레임 — 2026-03-05</p>

  <button class="btn btn-primary" onclick="send('build-all')">
    <span class="icon">⚡</span>
    전체 프레임 생성 (4개)
  </button>

  <hr class="divider" />

  <div class="section-title">Header 반응형</div>

  <button class="btn btn-secondary" onclick="send('build-header-mobile')">
    <span class="icon">📱</span>
    Header Mobile
    <span class="badge badge-mobile">360px</span>
  </button>

  <button class="btn btn-secondary" onclick="send('build-header-desktop')">
    <span class="icon">🖥</span>
    Header Desktop
    <span class="badge badge-desktop">1440px</span>
  </button>

  <div class="section-title">CommitSearchForm 반응형</div>

  <button class="btn btn-secondary" onclick="send('build-form-mobile')">
    <span class="icon">📱</span>
    CommitSearchForm Mobile
    <span class="badge badge-mobile">flex-col</span>
  </button>

  <button class="btn btn-secondary" onclick="send('build-form-desktop')">
    <span class="icon">🖥</span>
    CommitSearchForm Desktop
    <span class="badge badge-desktop">flex-row</span>
  </button>

  <hr class="divider" />

  <button class="btn btn-ghost" onclick="send('close')">
    <span class="icon">✕</span>
    플러그인 닫기
  </button>

  <div id="status"></div>

  <script>
    const messages = {
      'build-all':             '전체 프레임 생성 중...',
      'build-header-mobile':   'Header Mobile 프레임 생성 중...',
      'build-header-desktop':  'Header Desktop 프레임 생성 중...',
      'build-form-mobile':     'CommitSearchForm Mobile 프레임 생성 중...',
      'build-form-desktop':    'CommitSearchForm Desktop 프레임 생성 중...',
      'close':                 '종료 중...',
    };

    function send(type) {
      parent.postMessage({ pluginMessage: { type } }, '*');
      const el = document.getElementById('status');
      el.textContent = messages[type] || '';
    }
  </script>
</body>
</html>
